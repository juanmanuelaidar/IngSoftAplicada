<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Ingresar</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <section class="login-shell">
    <form class="login-form" (ngSubmit)="login()">
      <h1>Store Mobile</h1>

      <ion-list lines="full">
        <ion-item>
          <ion-label position="stacked">Usuario</ion-label>
          <ion-input [(ngModel)]="username" name="username" autocomplete="username"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">Contrasena</ion-label>
          <ion-input [(ngModel)]="password" name="password" type="password" autocomplete="current-password"></ion-input>
        </ion-item>
      </ion-list>

      <ion-button type="submit" expand="block" [disabled]="loading">
        <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
        <span *ngIf="!loading">Ingresar</span>
      </ion-button>

      <ion-text *ngIf="errorMessage" color="danger">
        <p>{{ errorMessage }}</p>
      </ion-text>
    </form>
  </section>
</ion-content>
